version: 0.2

phases:
  install:
    runtime-versions:
      python: 3.11
  build:
    commands:
      - echo "Installing dependencies..."
      - pip install -r requirements.txt || true
      - echo "Validating Lambda syntax..."
      - python -m py_compile lambda_function.py
      - echo "Build completed successfully"

artifacts:
  files:
    - lambda_function.py
    - requirements.txt